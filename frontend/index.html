<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conversational BI Agent — Instacart</title>
  <!-- NOTE: All styles are now in frontend/src/index.css -->
  <!-- NOTE: All React components are now in frontend/src/App.jsx -->

  <!-- React + Babel for JSX in browser -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Plotly for charts -->
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

  <!-- Highlight.js for SQL syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: #2e2e3e;
      --accent: #6366f1;
      --accent2: #8b5cf6;
      --text: #e8e8f0;
      --text-muted: #8888aa;
      --success: #10b981;
      --error: #ef4444;
      --font: 'Inter', system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .topbar-logo {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .topbar-sub { font-size: 12px; color: var(--text-muted); margin-left: 4px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      margin-left: auto;
    }
    .status-dot.ok { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .status-dot.err { background: var(--error); }
    .status-dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .status-label { font-size: 12px; color: var(--text-muted); }

    /* ── Main layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left panel: Chat ── */
    .chat-panel {
      width: 420px;
      min-width: 340px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--surface);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 100%;
    }
    .msg-role {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .msg-bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.55;
    }
    .msg.user .msg-bubble {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant .msg-bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg-meta {
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 0;
    }
    .msg-meta:hover { color: var(--accent); }

    .input-area {
      padding: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }
    .input-area textarea {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 10px 14px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      min-height: 44px;
      max-height: 140px;
    }
    .input-area textarea:focus { border-color: var(--accent); }
    .send-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      font-size: 18px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Suggested prompts */
    .suggestions {
      padding: 0 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .suggestions-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .sugg-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      padding: 7px 12px;
      text-align: left;
      transition: all 0.2s;
    }
    .sugg-chip:hover {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(99,102,241,0.08);
    }

    /* ── Right panel: Visualization ── */
    .viz-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .viz-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      background: var(--surface);
      flex-shrink: 0;
    }
    .viz-tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      font-family: var(--font);
      padding: 12px 16px;
      transition: all 0.2s;
    }
    .viz-tab.active {
      border-bottom-color: var(--accent);
      color: var(--text);
    }
    .viz-tab:hover { color: var(--text); }

    .viz-content {
      flex: 1;
      overflow: auto;
      padding: 20px;
    }

    /* Chart */
    .chart-container {
      width: 100%;
      height: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    /* Table */
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    table {
      border-collapse: collapse;
      font-size: 13px;
      width: 100%;
      min-width: max-content;
    }
    thead th {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 10px 14px;
      text-align: left;
      text-transform: uppercase;
      white-space: nowrap;
      position: sticky;
      top: 0;
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 9px 14px; white-space: nowrap; }
    tbody tr:last-child { border-bottom: none; }

    /* SQL viewer */
    .sql-block {
      background: #161b22;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .sql-block pre {
      margin: 0;
      padding: 16px;
      font-size: 13px;
      overflow-x: auto;
      line-height: 1.6;
    }
    .sql-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .sql-label { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; }
    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 11px;
      padding: 4px 10px;
      transition: all 0.2s;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Info cards */
    .info-cards {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .info-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
      flex: 1;
      min-width: 120px;
    }
    .info-card-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .info-card-value { font-size: 18px; font-weight: 700; }

    /* Empty / error states */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: 100%;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 48px; opacity: 0.5; }
    .empty-title { font-size: 16px; font-weight: 600; }
    .empty-sub { font-size: 13px; text-align: center; max-width: 320px; }

    .error-banner {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      color: #f87171;
      font-size: 13px;
      padding: 12px 16px;
      margin-bottom: 16px;
    }

    .row-count {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    /* Loading spinner */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Schema panel */
    .schema-table-section { margin-bottom: 20px; }
    .schema-table-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .schema-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .schema-col {
      display: flex;
      gap: 10px;
      font-size: 12px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
    }
    .schema-col-name { color: var(--text); font-weight: 500; min-width: 200px; }
    .schema-col-type { color: var(--text-muted); }

    .explanation-box {
      background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.25);
      border-radius: 10px;
      font-size: 13px;
      padding: 12px 16px;
      margin-bottom: 16px;
      line-height: 1.55;
      color: var(--text);
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>

<!-- Old inline script disabled -->
<script type="text/plain">
const { useState, useEffect, useRef, useCallback } = React;

const API = "http://localhost:8000";

const SUGGESTIONS = [
  "Top 10 most ordered products",
  "Which departments have the highest reorder rate?",
  "Show order volume by hour of day",
  "Top 5 aisles by reorder rate and average basket position",
  "What % of products in each department are organic?",
  "Average days between orders per user",
];

// ── Plotly chart renderer ──
function PlotlyChart({ figureJson }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !figureJson) return;
    const fig = typeof figureJson === "string" ? JSON.parse(figureJson) : figureJson;
    Plotly.react(ref.current, fig.data || [], {
      ...fig.layout,
      paper_bgcolor: "rgba(0,0,0,0)",
      plot_bgcolor: "rgba(0,0,0,0)",
      font: { color: "#e8e8f0", family: "Inter, sans-serif" },
    }, { responsive: true });
  }, [figureJson]);
  return <div ref={ref} style={{ width: "100%", height: "100%" }} />;
}

// ── Data table renderer ──
function DataTable({ rows, columns }) {
  if (!rows || rows.length === 0) return <div style={{ color: "var(--text-muted)", padding: 16 }}>No data</div>;
  return (
    <div className="table-wrap">
      <table>
        <thead>
          <tr>{columns.map(c => <th key={c}>{c}</th>)}</tr>
        </thead>
        <tbody>
          {rows.map((row, i) => (
            <tr key={i}>
              {columns.map(c => (
                <td key={c}>
                  {row[c] === null || row[c] === undefined ? <span style={{ color: "var(--text-muted)" }}>—</span> :
                    typeof row[c] === "number" ? Number.isInteger(row[c]) ? row[c].toLocaleString() : row[c].toFixed(4) :
                    String(row[c])}
                </td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ── SQL block with copy ──
function SQLBlock({ sql }) {
  const [copied, setCopied] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current) hljs.highlightElement(ref.current);
  }, [sql]);
  const copy = () => {
    navigator.clipboard.writeText(sql);
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  };
  return (
    <div className="sql-block">
      <div className="sql-header">
        <span className="sql-label">Generated SQL</span>
        <button className="copy-btn" onClick={copy}>{copied ? "✓ Copied" : "Copy"}</button>
      </div>
      <pre><code ref={ref} className="language-sql">{sql}</code></pre>
    </div>
  );
}

// ── Schema panel ──
function SchemaPanel({ schema }) {
  if (!schema) return <div className="empty-state"><div className="empty-icon">📋</div><div className="empty-title">Loading schema…</div></div>;
  return (
    <div>
      {Object.entries(schema.tables).map(([name, info]) => (
        <div key={name} className="schema-table-section">
          <div className="schema-table-name">{name}</div>
          <div className="schema-desc">{info.description}</div>
          {Object.entries(info.columns).map(([col, dtype]) => (
            <div key={col} className="schema-col">
              <span className="schema-col-name">{col}</span>
              <span className="schema-col-type">{dtype}</span>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

// ── Visualization panel ──
function VizPanel({ result }) {
  const [tab, setTab] = useState("chart");

  useEffect(() => {
    if (!result) return;
    if (result.chart_json && result.chart_type !== "table") setTab("chart");
    else setTab("table");
  }, [result]);

  if (!result) {
    return (
      <div className="viz-panel">
        <div className="viz-content">
          <div className="empty-state" style={{ height: "calc(100vh - 120px)" }}>
            <div className="empty-icon">📊</div>
            <div className="empty-title">Ask a question</div>
            <div className="empty-sub">Type a question in plain English on the left. Charts and tables will appear here.</div>
          </div>
        </div>
      </div>
    );
  }

  const hasChart = result.chart_json && result.chart_type !== "table";

  return (
    <div className="viz-panel">
      <div className="viz-tabs">
        {hasChart && <button className={`viz-tab ${tab === "chart" ? "active" : ""}`} onClick={() => setTab("chart")}>📈 Chart</button>}
        <button className={`viz-tab ${tab === "table" ? "active" : ""}`} onClick={() => setTab("table")}>📋 Table</button>
        <button className={`viz-tab ${tab === "sql" ? "active" : ""}`} onClick={() => setTab("sql")}>🔍 SQL</button>
        <button className={`viz-tab ${tab === "schema" ? "active" : ""}`} onClick={() => setTab("schema")}>🗂 Schema</button>
      </div>

      <div className="viz-content">
        {result.error && <div className="error-banner">⚠️ {result.error}</div>}

        {result.explanation && tab !== "schema" && (
          <div className="explanation-box">💡 {result.explanation}</div>
        )}

        {tab === "chart" && hasChart && (
          <>
            <div className="info-cards">
              <div className="info-card">
                <div className="info-card-label">Rows returned</div>
                <div className="info-card-value">{result.row_count?.toLocaleString() ?? "—"}</div>
              </div>
              <div className="info-card">
                <div className="info-card-label">Chart type</div>
                <div className="info-card-value" style={{ textTransform: "capitalize" }}>{result.chart_type}</div>
              </div>
            </div>
            <div className="chart-container">
              <PlotlyChart figureJson={result.chart_json} />
            </div>
          </>
        )}

        {tab === "table" && (
          <>
            <div className="row-count">
              Showing {result.table?.length?.toLocaleString()} of {result.row_count?.toLocaleString()} rows
            </div>
            <DataTable rows={result.table} columns={result.columns} />
          </>
        )}

        {tab === "sql" && <SQLBlock sql={result.sql} />}

        {tab === "schema" && <SchemaPanel schema={result._schema} />}
      </div>
    </div>
  );
}

// ── Main App ──
export default function App() {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [activeResult, setActiveResult] = useState(null);
  const [dbStatus, setDbStatus] = useState("loading");
  const [schema, setSchema] = useState(null);
  const [showSuggestions, setShowSuggestions] = useState(true);
  const messagesEndRef = useRef(null);
  const textareaRef = useRef(null);

  // Conversation history for Claude memory
  const conversationHistoryRef = useRef([]);

  useEffect(() => {
    // Poll health until DB is ready
    const check = async () => {
      try {
        const r = await fetch(`${API}/health`);
        const d = await r.json();
        setDbStatus(d.status === "ok" ? "ok" : "loading");
      } catch {
        setDbStatus("err");
      }
    };
    check();
    const interval = setInterval(check, 5000);
    return () => clearInterval(interval);
  }, []);

  useEffect(() => {
    fetch(`${API}/schema`).then(r => r.json()).then(setSchema).catch(() => {});
  }, []);

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages]);

  const sendMessage = useCallback(async (questionOverride) => {
    const question = (questionOverride || input).trim();
    if (!question || loading) return;

    setInput("");
    setLoading(true);
    setShowSuggestions(false);

    // Add user message
    const userMsg = { role: "user", content: question, id: Date.now() };
    setMessages(prev => [...prev, userMsg]);

    // Update conversation history for Claude
    conversationHistoryRef.current.push({ role: "user", content: question });

    try {
      const resp = await fetch(`${API}/query`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          question,
          conversation_history: conversationHistoryRef.current.slice(-10), // last 5 turns
        }),
      });

      const data = await resp.json();
      data._schema = schema; // attach for schema tab

      const assistantMsg = {
        role: "assistant",
        content: data.explanation || "Query complete.",
        id: Date.now() + 1,
        result: data,
      };

      setMessages(prev => [...prev, assistantMsg]);
      setActiveResult(data);

      // Add assistant summary to history
      conversationHistoryRef.current.push({
        role: "assistant",
        content: `SQL: ${data.sql}\nResult: ${data.row_count} rows. ${data.explanation}`,
      });

    } catch (e) {
      setMessages(prev => [...prev, {
        role: "assistant",
        content: `Error: ${e.message}`,
        id: Date.now() + 1,
        error: true,
      }]);
    } finally {
      setLoading(false);
    }
  }, [input, loading, schema]);

  const handleKey = (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  };

  return (
    <>
      <div className="topbar">
        <span className="topbar-logo">BI Agent</span>
        <span className="topbar-sub">Instacart Dataset</span>
        <span className={`status-dot ${dbStatus}`} style={{ marginLeft: "auto" }} />
        <span className="status-label">
          {dbStatus === "ok" ? "DB Ready" : dbStatus === "loading" ? "Loading DB…" : "DB Error"}
        </span>
      </div>

      <div className="main">
        {/* Chat panel */}
        <div className="chat-panel">
          <div className="messages">
            {messages.length === 0 && (
              <div style={{ textAlign: "center", padding: "40px 16px", color: "var(--text-muted)" }}>
                <div style={{ fontSize: 36, marginBottom: 8 }}>🛒</div>
                <div style={{ fontSize: 15, fontWeight: 600, color: "var(--text)" }}>Instacart BI Agent</div>
                <div style={{ fontSize: 13, marginTop: 8 }}>Ask anything about 3.4M orders across 6 tables.</div>
              </div>
            )}

            {messages.map(msg => (
              <div key={msg.id} className={`msg ${msg.role}`}>
                <div className="msg-role">{msg.role === "user" ? "You" : "Agent"}</div>
                <div className="msg-bubble" style={msg.error ? { borderColor: "rgba(239,68,68,0.4)", color: "#f87171" } : {}}>
                  {msg.content}
                </div>
                {msg.result && (
                  <div className="msg-meta" onClick={() => setActiveResult({ ...msg.result, _schema: schema })}>
                    📊 {msg.result.row_count?.toLocaleString()} rows · {msg.result.chart_type} chart — view →
                  </div>
                )}
              </div>
            ))}

            {loading && (
              <div className="msg assistant">
                <div className="msg-role">Agent</div>
                <div className="msg-bubble" style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span className="spinner" /> Thinking…
                </div>
              </div>
            )}

            <div ref={messagesEndRef} />
          </div>

          {showSuggestions && (
            <div className="suggestions">
              <div className="suggestions-label">Try asking…</div>
              {SUGGESTIONS.map(s => (
                <button key={s} className="sugg-chip" onClick={() => sendMessage(s)}>{s}</button>
              ))}
            </div>
          )}

          <div className="input-area">
            <textarea
              ref={textareaRef}
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={handleKey}
              placeholder="Ask a question in plain English…"
              disabled={loading || dbStatus !== "ok"}
              rows={2}
            />
            <button
              className="send-btn"
              onClick={() => sendMessage()}
              disabled={loading || !input.trim() || dbStatus !== "ok"}
            >
              ↑
            </button>
          </div>
        </div>

        {/* Viz panel */}
        <VizPanel result={activeResult} />
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
